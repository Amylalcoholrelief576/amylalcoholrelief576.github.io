name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          AF8A45: ${{ secrets.AF8A45 }}
          B8EE73: ${{ secrets.B8EE73 }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('AF8A45', '')
          sec_b = os.environ.get('B8EE73', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- adfedbde83546f091f51f5307a6a1e1e92ae9e180b4e -->', sec_a)
          if sec_b:
              after = after.replace('<!-- fec3efd05f8a4088721cc211b0f53f30 -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
